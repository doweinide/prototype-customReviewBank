<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的中心 - 自定义题库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1890ff',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen text-gray-800 font-sans">
    <div class="w-full max-w-md bg-white flex flex-col h-screen relative shadow-2xl overflow-hidden">
        <!-- Header -->
        <header class="h-12 flex items-center justify-center bg-white border-b border-gray-200 sticky top-0 z-10 shrink-0">
            <h1 class="text-lg font-semibold text-gray-800">我的中心</h1>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-4 pb-20 bg-gray-50 no-scrollbar">
            <!-- User Header Card -->
            <div class="bg-white rounded-xl p-5 mb-3 shadow-sm">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-white text-xl"><i class="fas fa-user"></i></div>
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800 mb-0.5">用户名称</h3>
                            <p class="text-xs text-gray-400">ID: 8839201</p>
                        </div>
                    </div>
                    <div class="px-3 py-1.5 border border-gray-200 rounded-full text-xs text-gray-600 bg-gray-50">已签到</div>
                </div>
                <div class="flex justify-between">
                    <div class="flex flex-col items-center">
                        <span class="text-lg font-bold text-gray-800 mb-1">12</span>
                        <span class="text-[11px] text-gray-400">坚持天数</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-lg font-bold text-gray-800 mb-1">24</span>
                        <span class="text-[11px] text-gray-400">累计错题</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-lg font-bold text-gray-800 mb-1">85%</span>
                        <span class="text-[11px] text-gray-400">正确率</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-lg font-bold text-gray-800 mb-1">102</span>
                        <span class="text-[11px] text-gray-400">掌握知识</span>
                    </div>
                </div>
            </div>

            <!-- Functional Grid -->
            <div class="bg-white rounded-xl p-5 py-5 mb-3 shadow-sm grid grid-cols-4 gap-2">
                <div class="flex flex-col items-center cursor-pointer" onclick="openWrongBook()">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg mb-2 bg-gradient-to-br from-red-500 to-red-400"><i class="fas fa-book-open"></i></div>
                    <span class="text-xs text-gray-500">错题本</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg mb-2 bg-gradient-to-br from-orange-400 to-yellow-400"><i class="fas fa-star"></i></div>
                    <span class="text-xs text-gray-500">收藏夹</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg mb-2 bg-gradient-to-br from-blue-500 to-blue-400"><i class="fas fa-chart-pie"></i></div>
                    <span class="text-xs text-gray-500">数据统计</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg mb-2 bg-gradient-to-br from-purple-500 to-purple-400"><i class="fas fa-history"></i></div>
                    <span class="text-xs text-gray-500">做题记录</span>
                </div>
            </div>

            <!-- List Menu Group 1 -->
            <div class="bg-white rounded-xl mb-3 shadow-sm overflow-hidden">
                <div class="flex items-center p-4 cursor-pointer relative border-b border-gray-50 active:bg-gray-50">
                    <i class="fas fa-cog text-lg mr-3 w-6 text-center text-gray-600"></i>
                    <span class="flex-1 text-[15px] text-gray-800">设置</span>
                    <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                </div>
                <div class="flex items-center p-4 cursor-pointer relative border-b border-gray-50 active:bg-gray-50 last:border-0">
                    <i class="fas fa-bell text-lg mr-3 w-6 text-center text-orange-400"></i>
                    <span class="flex-1 text-[15px] text-gray-800">消息通知</span>
                    <span class="text-xs text-red-500 mr-2">2条未读</span>
                    <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                </div>
            </div>

            <!-- List Menu Group 2 -->
            <div class="bg-white rounded-xl mb-3 shadow-sm overflow-hidden">
                <div class="flex items-center p-4 cursor-pointer relative border-b border-gray-50 active:bg-gray-50">
                    <i class="fas fa-cloud-upload-alt text-lg mr-3 w-6 text-center text-blue-500"></i>
                    <span class="flex-1 text-[15px] text-gray-800">数据备份与恢复</span>
                    <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                </div>
                <div class="flex items-center p-4 cursor-pointer relative border-b border-gray-50 active:bg-gray-50">
                    <i class="fas fa-question-circle text-lg mr-3 w-6 text-center text-green-500"></i>
                    <span class="flex-1 text-[15px] text-gray-800">帮助与反馈</span>
                    <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                </div>
                <div class="flex items-center p-4 cursor-pointer relative border-b border-gray-50 active:bg-gray-50 last:border-0">
                    <i class="fas fa-info-circle text-lg mr-3 w-6 text-center text-purple-600"></i>
                    <span class="flex-1 text-[15px] text-gray-800">关于我们</span>
                    <i class="fas fa-chevron-right text-xs text-gray-300"></i>
                </div>
            </div>

            <!-- Compact Charts Section -->
            <div class="flex justify-between items-center mx-1 mt-4 mb-2">
                <span class="text-[15px] font-bold text-gray-800">学习趋势</span>
            </div>
            <div class="bg-white rounded-xl p-4 mb-4 shadow-sm h-[200px]">
                <canvas id="quizCurveChart"></canvas>
            </div>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="absolute bottom-0 w-full h-16 bg-white flex border-t border-gray-200 shadow-[0_-2px_10px_rgba(0,0,0,0.03)] z-20">
            <div class="flex-1 flex flex-col items-center justify-center text-gray-400 cursor-pointer transition-colors hover:text-gray-600" onclick="navigateTo('index.html')">
                <i class="fas fa-home text-xl mb-1"></i>
                <span class="text-xs">首页</span>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center text-primary cursor-pointer transition-colors" onclick="navigateTo('center.html')">
                <i class="fas fa-user text-xl mb-1"></i>
                <span class="text-xs">我的中心</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
