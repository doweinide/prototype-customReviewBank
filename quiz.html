<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>做题中 - 自定义题库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1890ff',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen text-gray-800 font-sans">
    <div class="w-full max-w-md bg-white flex flex-col h-screen relative shadow-2xl overflow-hidden">
        <!-- Quiz View -->
        <header class="h-12 flex items-center justify-between px-4 bg-white border-b border-gray-200 sticky top-0 z-10 shrink-0">
            <i class="fas fa-arrow-left text-lg text-gray-600 cursor-pointer p-1" onclick="navigateTo('index.html')"></i>
            <h1 id="quiz-title" class="text-lg font-semibold text-gray-800 truncate max-w-[150px]">做题中</h1>
            
            <div class="flex items-center gap-2">
                <select id="quiz-mode-select" class="text-xs border border-gray-200 rounded p-1 bg-gray-50 text-gray-600 focus:outline-none" onchange="changeQuizMode(this.value)">
                    <option value="immediate">立即判题</option>
                    <option value="submit_all">整组提交</option>
                </select>
                <span id="quiz-progress" class="text-sm text-gray-500 w-10 text-right">0/0</span>
            </div>
        </header>
        
        <!-- Question Container -->
        <div id="quiz-container" class="flex-1 overflow-y-auto p-4 pb-20 bg-gray-50 no-scrollbar">
            <!-- Dynamic Content -->
        </div>

        <!-- Result Overview (Hidden by default) -->
        <div id="quiz-overview" class="hidden flex-1 overflow-y-auto p-4 bg-gray-50">
            <div class="bg-white rounded-xl p-6 text-center shadow-sm mb-4">
                <div class="text-gray-500 text-sm mb-2">本次得分</div>
                <div class="text-4xl font-bold text-primary mb-2" id="score-display">0</div>
                <div class="text-xs text-gray-400">共 <span id="total-count">0</span> 题，答对 <span id="correct-count">0</span> 题</div>
            </div>
            
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <h3 class="text-sm font-bold text-gray-700 mb-3">答题卡</h3>
                <div class="grid grid-cols-5 gap-3" id="overview-grid">
                    <!-- Grid items generated by JS -->
                </div>
            </div>
            
            <div class="mt-6 flex gap-3">
                <button class="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-medium" onclick="restartQuiz()">再来一组</button>
                <button class="flex-1 bg-primary text-white py-2.5 rounded-lg text-sm font-medium" onclick="navigateTo('index.html')">返回首页</button>
            </div>
        </div>

        <!-- Bottom Action Bar (Fixed) -->
        <div id="quiz-action-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-between items-center max-w-md mx-auto">
             <button class="px-4 py-2 text-gray-500 text-sm disabled:opacity-30" id="prev-btn" onclick="prevQuestion()">上一题</button>
             <button class="px-6 py-2 bg-primary text-white rounded-lg text-sm shadow-sm active:bg-blue-600 transition" id="action-btn" onclick="handleAction()">提交答案</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Init Quiz
        document.addEventListener('DOMContentLoaded', () => {
            initQuizPage();
        });
    </script>
</body>
</html>
