<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>做题中 - 自定义题库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1890ff',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen text-gray-800 font-sans">
    <div class="w-full max-w-md bg-white flex flex-col h-screen relative shadow-2xl overflow-hidden">
        <!-- Quiz View -->
        <header class="h-12 flex items-center justify-center bg-white border-b border-gray-200 sticky top-0 z-10 shrink-0">
            <i class="fas fa-arrow-left absolute left-4 text-lg text-gray-600 cursor-pointer p-1" onclick="navigateTo('index.html')"></i>
            <h1 id="quiz-title" class="text-lg font-semibold text-gray-800">做题中</h1>
            <span class="absolute right-4 text-sm text-gray-500">1/10</span>
        </header>
        <div class="flex-1 overflow-y-auto p-4 pb-20 bg-gray-50 no-scrollbar">
            <div class="bg-white rounded-xl p-5 mb-4 shadow-sm min-h-[150px] flex flex-col justify-center">
                <span class="inline-block px-2 py-0.5 bg-blue-50 text-primary rounded text-xs w-fit mb-2">单选题</span>
                <p class="text-base font-medium leading-relaxed text-gray-800">在 Vue 3 中，使用哪个函数来定义响应式对象？</p>
            </div>
            <div class="space-y-3">
                <div class="option-item bg-white border border-gray-200 rounded-xl p-4 cursor-pointer transition active:bg-blue-50 active:border-primary active:text-primary" onclick="selectOption(this)">A. ref()</div>
                <div class="option-item bg-white border border-gray-200 rounded-xl p-4 cursor-pointer transition active:bg-blue-50 active:border-primary active:text-primary" onclick="selectOption(this)">B. reactive()</div>
                <div class="option-item bg-white border border-gray-200 rounded-xl p-4 cursor-pointer transition active:bg-blue-50 active:border-primary active:text-primary" onclick="selectOption(this)">C. computed()</div>
                <div class="option-item bg-white border border-gray-200 rounded-xl p-4 cursor-pointer transition active:bg-blue-50 active:border-primary active:text-primary" onclick="selectOption(this)">D. watch()</div>
            </div>
            <div class="mt-8 flex justify-center">
                <button class="bg-primary text-white px-8 py-2.5 rounded-lg text-sm shadow-md active:bg-blue-600 transition" onclick="submitAnswer()">提交答案</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Simple init script to set title from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const title = urlParams.get('title');
        if (title) {
            document.getElementById('quiz-title').textContent = title;
        }
    </script>
</body>
</html>
