<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智库 AI - 知识体系 (Web版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6', // blue-500
                        secondary: '#64748b', // slate-500
                        bg: '#f1f5f9', // slate-100
                        surface: '#ffffff',
                    },
                    boxShadow: {
                        'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'DEFAULT': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .view-section {
            animation: fadeIn 0.3s ease-out forwards;
            height: 100%;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-bg h-screen flex overflow-hidden text-slate-800 antialiased selection:bg-blue-100 selection:text-primary">
    
    <!-- Sidebar -->
    <aside class="w-72 bg-surface border-r border-slate-200 flex flex-col shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        <div class="h-20 flex items-center px-8">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white mr-3 shadow-lg shadow-blue-500/30">
                <i class="fas fa-brain text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">智库 AI</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wider">KNOWLEDGE BRAIN</p>
            </div>
        </div>
        
        <div class="p-6 flex-1 overflow-y-auto">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2">Menu</div>
            <nav class="space-y-2">
                <a href="index.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-home w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    首页概览
                </a>
                <a href="knowledge.html" class="nav-item active flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-primary bg-blue-50 transition-all duration-200 group">
                    <i class="fas fa-project-diagram w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    知识体系
                </a>
                <a href="note.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-book w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    智能笔记
                </a>
                <a href="quiz.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-pen-nib w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    题库练习
                </a>
            </nav>

            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2 mt-8">User</div>
            <nav class="space-y-2">
                <a href="center.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-user-circle w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    个人中心
                </a>
                 <a href="center.html?tab=settings" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-cog w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    系统设置
                </a>
            </nav>
        </div>
        
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-bg">
        <!-- Top Bar -->
        <header class="h-16 bg-surface border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center text-sm text-slate-500">
                <span class="font-semibold text-slate-800" id="page-title">知识体系</span>
            </div>
            <div class="flex items-center gap-4">
                 <div class="text-xs text-slate-400">上次同步: 刚刚</div>
                 <div class="w-8 h-8 rounded-full bg-blue-100 text-primary flex items-center justify-center font-bold text-xs">AU</div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="flex-1 p-4 overflow-hidden h-[calc(100vh-64px)]">
            
            <!-- Knowledge Management View -->
            <div id="view-knowledge" class="view-section h-full">
                <div class="grid grid-cols-12 gap-4 h-full">
                    <div class="col-span-4 bg-surface rounded-xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                        <div class="p-3 border-b border-slate-100 bg-slate-50 flex flex-col gap-2">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-slate-800">知识体系</h3>
                                <div class="flex gap-1">
                                    <button class="p-1.5 text-slate-500 hover:bg-slate-200 rounded transition" title="新建" onclick="addRootNode()"><i class="fas fa-plus"></i></button>
                                    <button class="p-1.5 text-slate-500 hover:bg-slate-200 rounded transition" title="导入" onclick="importTreeJSON()"><i class="fas fa-file-import"></i></button>
                                </div>
                            </div>
                            <input type="text" placeholder="搜索..." class="w-full px-3 py-1.5 text-xs border border-slate-200 rounded-md focus:outline-none focus:border-primary" oninput="searchTree(this.value)">
                        </div>
                        <div class="flex-1 overflow-y-auto p-2" id="web-manage-tree-root"></div>
                    </div>
                    <div class="col-span-8 bg-surface rounded-xl shadow-sm border border-slate-200 flex flex-col h-full p-6 relative">
                         <div id="knowledge-placeholder" class="flex flex-col items-center justify-center h-full text-slate-400">
                             <i class="fas fa-project-diagram text-3xl mb-2 opacity-50"></i>
                             <p class="text-sm">选择左侧节点查看详情</p>
                         </div>
                         <div id="knowledge-detail" class="hidden flex flex-col h-full">
                              <header class="flex justify-between items-start mb-4 border-b border-slate-100 pb-4">
                                  <div>
                                      <h2 class="text-xl font-bold text-slate-800" id="selected-node-title">Node Title</h2>
                                      <div class="text-xs text-slate-500 mt-1 flex gap-3">
                                          <span class="bg-slate-100 px-1.5 rounded">ID: <span id="selected-node-id"></span></span>
                                          <span>题目数: <span id="selected-node-count">0</span></span>
                                      </div>
                                  </div>
                                  <div class="flex gap-2">
                                      <button class="bg-primary text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-600 transition" onclick="showAddQuestionForm()">
                                          <i class="fas fa-plus mr-1"></i>录入
                                      </button>
                                      <button class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 transition" onclick="showAIQuestionForm()">
                                          <i class="fas fa-magic mr-1"></i>AI
                                      </button>
                                  </div>
                              </header>
                              <div class="flex-1 overflow-y-auto space-y-3" id="node-question-list"></div>
                         </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Global Modals (Add Question, Batch Import) -->
    <!-- Add Question Overlay -->
    <div id="add-question-overlay" class="absolute inset-0 bg-black/20 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-[600px] rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
             <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                 <h3 class="font-bold">录入题目</h3>
                 <button onclick="hideAddQuestionForm()"><i class="fas fa-times"></i></button>
             </div>
             <div class="p-6 overflow-y-auto flex-1 space-y-4">
                 <textarea id="new-q-title" class="w-full border p-3 rounded-lg text-sm" placeholder="题目内容..." rows="3"></textarea>
                 <div class="grid grid-cols-2 gap-4">
                     <select id="new-q-type" class="border p-2 rounded-lg text-sm"><option value="单选题">单选题</option><option value="多选题">多选题</option></select>
                     <select class="border p-2 rounded-lg text-sm"><option value="easy">简单</option><option value="medium">中等</option></select>
                 </div>
                 <div id="new-q-options" class="space-y-2">
                     <input placeholder="选项 A" class="w-full border p-2 rounded text-sm">
                     <input placeholder="选项 B" class="w-full border p-2 rounded text-sm">
                     <input placeholder="选项 C" class="w-full border p-2 rounded text-sm">
                     <input placeholder="选项 D" class="w-full border p-2 rounded text-sm">
                 </div>
             </div>
             <div class="p-4 border-t border-slate-100 flex justify-end gap-2">
                 <button class="px-4 py-2 text-sm text-slate-600" onclick="hideAddQuestionForm()">取消</button>
                 <button class="px-4 py-2 text-sm bg-primary text-white rounded-lg" onclick="saveNewQuestion()">保存</button>
             </div>
        </div>
    </div>

    <!-- Batch Import Overlay -->
    <div id="batch-import-overlay" class="absolute inset-0 bg-black/20 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-[500px] rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
             <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                 <h3 class="font-bold">批量导入</h3>
                 <button onclick="hideBatchImportForm()"><i class="fas fa-times"></i></button>
             </div>
             <div class="p-4 flex-1">
                 <textarea id="batch-import-input" class="w-full h-64 border p-3 rounded-lg font-mono text-xs" placeholder="Paste JSON here..."></textarea>
             </div>
             <div class="p-4 border-t border-slate-100 flex justify-end gap-2">
                 <button class="px-4 py-2 text-sm text-slate-600" onclick="hideBatchImportForm()">取消</button>
                 <button class="px-4 py-2 text-sm bg-primary text-white rounded-lg" onclick="processBatchImportQuestions()">导入</button>
             </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
