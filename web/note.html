<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智库 AI - 智能笔记 (Web版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6', // blue-500
                        secondary: '#64748b', // slate-500
                        bg: '#f1f5f9', // slate-100
                        surface: '#ffffff',
                    },
                    boxShadow: {
                        'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'DEFAULT': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .view-section {
            animation: fadeIn 0.3s ease-out forwards;
            height: 100%;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-bg h-screen flex overflow-hidden text-slate-800 antialiased selection:bg-blue-100 selection:text-primary">
    
    <!-- Sidebar -->
    <aside class="w-72 bg-surface border-r border-slate-200 flex flex-col shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        <div class="h-20 flex items-center px-8">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white mr-3 shadow-lg shadow-blue-500/30">
                <i class="fas fa-brain text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">智库 AI</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wider">KNOWLEDGE BRAIN</p>
            </div>
        </div>
        
        <div class="p-6 flex-1 overflow-y-auto">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2">Menu</div>
            <nav class="space-y-2">
                <a href="index.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-home w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    首页概览
                </a>
                <a href="knowledge.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-project-diagram w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    知识体系
                </a>
                <a href="note.html" class="nav-item active flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-primary bg-blue-50 transition-all duration-200 group">
                    <i class="fas fa-book w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    智能笔记
                </a>
                <a href="quiz.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-pen-nib w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    题库练习
                </a>
            </nav>

            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2 mt-8">User</div>
            <nav class="space-y-2">
                <a href="center.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-user-circle w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    个人中心
                </a>
                 <a href="center.html?tab=settings" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-cog w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    系统设置
                </a>
            </nav>
        </div>
        
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-bg">
        <!-- Top Bar -->
        <header class="h-16 bg-surface border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center text-sm text-slate-500">
                <span class="font-semibold text-slate-800" id="page-title">智能笔记</span>
            </div>
            <div class="flex items-center gap-4">
                 <div class="text-xs text-slate-400">上次同步: 刚刚</div>
                 <div class="w-8 h-8 rounded-full bg-blue-100 text-primary flex items-center justify-center font-bold text-xs">AU</div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="flex-1 p-4 overflow-hidden h-[calc(100vh-64px)]">
            
            <!-- Note View -->
            <div id="view-note" class="view-section h-full">
                <div class="grid grid-cols-12 gap-4 h-full">
                    <div class="col-span-4 bg-surface rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                        <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h3 class="font-bold text-slate-800">笔记列表</h3>
                            <button class="text-primary hover:bg-blue-50 p-1.5 rounded" onclick="createNote()"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2" id="web-note-list"></div>
                    </div>
                    <div class="col-span-8 bg-surface rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden p-6 relative">
                        <div id="web-note-editor" class="flex flex-col h-full hidden">
                            <input type="text" id="web-note-title" class="text-2xl font-bold w-full border-b border-transparent focus:border-slate-200 pb-2 focus:outline-none mb-4" placeholder="笔记标题">
                            <div class="flex gap-3 mb-4 text-xs text-slate-500">
                                <span class="bg-slate-100 px-2 py-1 rounded"><i class="fas fa-tag mr-1"></i><span id="web-note-tag">未分类</span></span>
                                <span>2023-10-27</span>
                            </div>
                            <textarea id="web-note-content" class="flex-1 w-full resize-none focus:outline-none text-slate-700 leading-relaxed text-sm" placeholder="输入笔记内容..."></textarea>
                            <div class="border-t border-slate-100 pt-4 mt-4">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-bold text-slate-700 text-sm">关联题目</h4>
                                    <div class="flex gap-2">
                                        <button class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded hover:bg-slate-200" onclick="generateQuestionsFromNote()">AI 生成</button>
                                        <button class="text-xs bg-primary text-white px-3 py-1 rounded hover:bg-blue-600" onclick="saveNote()">保存</button>
                                    </div>
                                </div>
                                <div id="web-note-questions" class="space-y-2 max-h-32 overflow-y-auto text-xs"></div>
                            </div>
                        </div>
                        <div id="web-note-placeholder" class="flex flex-col items-center justify-center h-full text-slate-400">
                            <i class="far fa-edit text-3xl mb-2 opacity-50"></i>
                            <p class="text-sm">选择或新建笔记</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Tree Modal for Note Tag Selection -->
    <div id="tree-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-surface rounded-xl w-[500px] max-h-[80vh] flex flex-col shadow-2xl border border-slate-100">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-slate-800">选择知识点</h3>
                <button onclick="closeModal('tree-modal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4" id="tree-root"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
