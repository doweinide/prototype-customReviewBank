<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智库 AI - 题库练习 (Web版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6', // blue-500
                        secondary: '#64748b', // slate-500
                        bg: '#f1f5f9', // slate-100
                        surface: '#ffffff',
                    },
                    boxShadow: {
                        'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'DEFAULT': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .view-section {
            animation: fadeIn 0.3s ease-out forwards;
            height: 100%;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-bg h-screen flex overflow-hidden text-slate-800 antialiased selection:bg-blue-100 selection:text-primary">
    
    <!-- Sidebar -->
    <aside class="w-72 bg-surface border-r border-slate-200 flex flex-col shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        <div class="h-20 flex items-center px-8">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white mr-3 shadow-lg shadow-blue-500/30">
                <i class="fas fa-brain text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">智库 AI</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wider">KNOWLEDGE BRAIN</p>
            </div>
        </div>
        
        <div class="p-6 flex-1 overflow-y-auto">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2">Menu</div>
            <nav class="space-y-2">
                <a href="index.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-home w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    首页概览
                </a>
                <a href="knowledge.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-project-diagram w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    知识体系
                </a>
                <a href="note.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-book w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    智能笔记
                </a>
                <a href="quiz.html" class="nav-item active flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-primary bg-blue-50 transition-all duration-200 group">
                    <i class="fas fa-pen-nib w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    题库练习
                </a>
            </nav>

            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2 mt-8">User</div>
            <nav class="space-y-2">
                <a href="center.html" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-user-circle w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    个人中心
                </a>
                 <a href="center.html?tab=settings" class="nav-item flex items-center px-4 py-3 rounded-xl text-sm font-medium cursor-pointer text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                    <i class="fas fa-cog w-6 text-center mr-3 group-hover:scale-110 transition-transform"></i>
                    系统设置
                </a>
            </nav>
        </div>
        
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-bg">
        <!-- Top Bar -->
        <header class="h-16 bg-surface border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center text-sm text-slate-500">
                <span class="font-semibold text-slate-800" id="page-title">题库练习</span>
            </div>
            <div class="flex items-center gap-4">
                 <div class="text-xs text-slate-400">上次同步: 刚刚</div>
                 <div class="w-8 h-8 rounded-full bg-blue-100 text-primary flex items-center justify-center font-bold text-xs">AU</div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="flex-1 p-4 overflow-hidden h-[calc(100vh-64px)]">
            
            <!-- Quiz View (Split Layout) -->
            <div id="view-quiz" class="view-section h-full">
                <div class="grid grid-cols-12 gap-4 h-full">
                    
                    <!-- Left Sidebar: Knowledge Tree Selection -->
                    <div class="col-span-3 bg-surface rounded-xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                        <div class="p-3 border-b border-slate-100 bg-slate-50 flex flex-col gap-2">
                            <h3 class="font-bold text-slate-800">选择练习范围</h3>
                            <input type="text" placeholder="搜索知识点..." class="w-full px-3 py-1.5 text-xs border border-slate-200 rounded-md focus:outline-none focus:border-primary" oninput="searchTree(this.value)">
                        </div>
                        <div class="flex-1 overflow-y-auto p-2" id="web-manage-tree-root"></div>
                    </div>

                    <!-- Right Content: Practice Area -->
                    <div class="col-span-9 bg-surface rounded-xl shadow-sm border border-slate-200 flex flex-col h-full p-6 relative overflow-hidden">
                        
                        <!-- Empty State -->
                        <div id="quiz-placeholder" class="flex flex-col items-center justify-center h-full text-slate-400">
                            <i class="fas fa-mouse-pointer text-3xl mb-2 opacity-50"></i>
                            <p class="text-sm">请在左侧选择一个知识点开始专项练习</p>
                        </div>

                        <!-- Active Quiz View -->
                        <div id="quiz-active-view" class="hidden flex flex-col h-full">
                            <header class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                <div>
                                    <h2 class="text-xl font-bold text-slate-800" id="quiz-title">Vue3 基础核心</h2>
                                    <div class="text-xs text-slate-500 mt-1">共 20 题 • 上次正确率 85%</div>
                                </div>
                                <div class="flex gap-2">
                                    <button class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-200 transition">
                                        <i class="fas fa-history mr-1"></i>练习历史
                                    </button>
                                    <button class="bg-primary text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-600 transition shadow-lg shadow-blue-500/20" onclick="startQuizSession()">
                                        <i class="fas fa-play mr-1"></i>开始练习
                                    </button>
                                </div>
                            </header>

                            <!-- Quiz Content (Question List or Active Question) -->
                            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                <!-- Mode Selection -->
                                <div class="grid grid-cols-3 gap-4 mb-6">
                                    <div class="border border-primary bg-blue-50 p-4 rounded-xl cursor-pointer relative overflow-hidden">
                                        <div class="absolute top-2 right-2 text-primary"><i class="fas fa-check-circle"></i></div>
                                        <h4 class="font-bold text-primary mb-1">顺序练习</h4>
                                        <p class="text-xs text-slate-600">按顺序逐一攻克题目</p>
                                    </div>
                                    <div class="border border-slate-200 hover:border-primary hover:bg-slate-50 p-4 rounded-xl cursor-pointer transition">
                                        <h4 class="font-bold text-slate-700 mb-1">随机抽题</h4>
                                        <p class="text-xs text-slate-500">从题库中随机抽取 10 题</p>
                                    </div>
                                    <div class="border border-slate-200 hover:border-primary hover:bg-slate-50 p-4 rounded-xl cursor-pointer transition">
                                        <h4 class="font-bold text-slate-700 mb-1">背题模式</h4>
                                        <p class="text-xs text-slate-500">直接查看答案和解析</p>
                                    </div>
                                </div>

                                <!-- Preview Question List -->
                                <h3 class="font-bold text-slate-800 mb-3 text-sm">题目预览</h3>
                                <div class="space-y-3" id="quiz-preview-list">
                                    <!-- Dynamic Items -->
                                    <div class="p-4 border border-slate-100 rounded-xl bg-slate-50 flex justify-between items-center">
                                        <div class="flex gap-3">
                                            <span class="bg-blue-100 text-primary px-2 py-0.5 rounded text-xs font-bold h-fit">单选</span>
                                            <div>
                                                <div class="text-sm font-bold text-slate-700 mb-1">Vue3 中定义响应式数据推荐使用哪个 API？</div>
                                                <div class="text-xs text-slate-400">难度: 简单 • 错误率: 15%</div>
                                            </div>
                                        </div>
                                        <i class="fas fa-chevron-right text-slate-300"></i>
                                    </div>
                                    <div class="p-4 border border-slate-100 rounded-xl bg-slate-50 flex justify-between items-center">
                                        <div class="flex gap-3">
                                            <span class="bg-purple-100 text-purple-600 px-2 py-0.5 rounded text-xs font-bold h-fit">多选</span>
                                            <div>
                                                <div class="text-sm font-bold text-slate-700 mb-1">下列哪些是 Vue3 的新特性？</div>
                                                <div class="text-xs text-slate-400">难度: 中等 • 错误率: 45%</div>
                                            </div>
                                        </div>
                                        <i class="fas fa-chevron-right text-slate-300"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
