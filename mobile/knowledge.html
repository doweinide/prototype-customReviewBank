<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理 - 自定义题库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1890ff',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen text-gray-800 font-sans">
    <div class="w-full max-w-md bg-white flex flex-col h-screen relative shadow-2xl overflow-hidden">
        
        <!-- Tree Manage Section -->
        <div id="tree-manage-section" class="flex flex-col h-full">
            <header class="h-12 flex items-center justify-center bg-white border-b border-gray-200 sticky top-0 z-10 shrink-0">
                <i class="fas fa-arrow-left absolute left-4 text-lg text-gray-600 cursor-pointer p-1" onclick="navigateTo('index.html')"></i>
                <h1 class="text-lg font-semibold text-gray-800">知识树管理</h1>
                <span class="absolute right-4 text-lg text-gray-600 cursor-pointer p-1" onclick="exportTreeJSON()"><i class="fas fa-download"></i></span>
            </header>
            <div class="flex-1 overflow-y-auto p-4 pb-20 bg-gray-50 no-scrollbar">
                <div class="flex gap-2 mb-4">
                    <button class="flex-1 bg-white border border-primary text-primary py-1.5 px-3 rounded-lg text-xs flex items-center justify-center gap-1 active:bg-blue-50" onclick="importTreeJSON()"><i class="fas fa-file-import"></i> 导入 JSON</button>
                    <button class="flex-1 bg-white border border-primary text-primary py-1.5 px-3 rounded-lg text-xs flex items-center justify-center gap-1 active:bg-blue-50" onclick="addRootNode()"><i class="fas fa-plus"></i> 新增根节点</button>
                </div>
                <div class="bg-white rounded-xl p-2 shadow-sm" id="manage-tree-root">
                    <!-- Tree content will be rendered here with edit controls -->
                </div>
            </div>
        </div>

        <!-- Add Question Section (Initially Hidden) -->
        <div id="add-question-section" class="fixed inset-0 bg-white z-50 flex flex-col hidden transform transition-transform duration-300">
            <header class="h-12 flex items-center justify-center bg-white border-b border-gray-200 sticky top-0 z-10 shrink-0">
                <i class="fas fa-arrow-left absolute left-4 text-lg text-gray-600 cursor-pointer p-1" onclick="document.getElementById('add-question-section').classList.add('hidden'); document.getElementById('tree-manage-section').classList.remove('hidden');"></i>
                <h1 class="text-lg font-semibold text-gray-800">新增题目</h1>
            </header>
            <div class="flex-1 overflow-y-auto p-4 pb-20 bg-gray-50 no-scrollbar">
                <!-- Tabs -->
                <div class="flex bg-white rounded-lg p-1 mb-5 shadow-sm">
                    <div class="flex-1 text-center py-2 rounded-md text-sm cursor-pointer transition bg-primary text-white font-medium tab-btn" onclick="switchAddTab('single')">单题录入</div>
                    <div class="flex-1 text-center py-2 rounded-md text-sm cursor-pointer transition text-gray-500 hover:bg-gray-50 tab-btn" onclick="switchAddTab('batch')">批量导入</div>
                </div>

                <!-- Single Add Form -->
                <div id="add-single-form" class="add-tab-content block">
                    <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-2">所属知识点</label>
                        <div class="flex justify-between items-center p-3 border border-gray-200 rounded-lg text-gray-500 cursor-pointer bg-gray-50" onclick="openKnowledgeTree('select-for-question')">
                            <span id="selected-node-name" class="text-sm">请选择知识点...</span>
                            <i class="fas fa-chevron-right text-xs text-gray-400"></i>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-2">题目类型</label>
                        <div class="flex gap-6">
                            <label class="flex items-center text-sm text-gray-600"><input type="radio" name="q-type" checked class="mr-2 text-primary focus:ring-primary"> 单选</label>
                            <label class="flex items-center text-sm text-gray-600"><input type="radio" name="q-type" class="mr-2 text-primary focus:ring-primary"> 多选</label>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-2">题目内容</label>
                        <textarea rows="3" placeholder="请输入题目描述" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-primary resize-none"></textarea>
                    </div>
                    <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-2">选项 (点击标记正确答案)</label>
                        <div id="options-container" class="space-y-3 mb-3">
                            <div class="option-wrapper">
                                <div class="flex items-center gap-2 mb-2">
                                    <input type="radio" name="correct-opt" title="设为正确答案" class="text-primary focus:ring-primary">
                                    <input type="text" placeholder="选项 A" class="flex-1 p-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-primary">
                                    <i class="fas fa-comment-dots text-gray-400 cursor-pointer hover:text-primary p-1" onclick="toggleOptionExplain(this)" title="添加解析"></i>
                                </div>
                                <input type="text" class="option-explain hidden w-full mt-1 p-2 border border-dashed border-gray-300 rounded text-xs bg-gray-50 focus:outline-none" placeholder="选项解析...">
                            </div>
                            <div class="option-wrapper">
                                <div class="flex items-center gap-2 mb-2">
                                    <input type="radio" name="correct-opt" title="设为正确答案" class="text-primary focus:ring-primary">
                                    <input type="text" placeholder="选项 B" class="flex-1 p-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-primary">
                                    <i class="fas fa-comment-dots text-gray-400 cursor-pointer hover:text-primary p-1" onclick="toggleOptionExplain(this)" title="添加解析"></i>
                                </div>
                                <input type="text" class="option-explain hidden w-full mt-1 p-2 border border-dashed border-gray-300 rounded text-xs bg-gray-50 focus:outline-none" placeholder="选项解析...">
                            </div>
                        </div>
                         <button class="w-full py-2 border border-dashed border-gray-300 text-gray-500 rounded-lg text-sm hover:border-primary hover:text-primary transition" onclick="addOptionInput()">+ 添加选项</button>
                    </div>
                    <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-2">题目解析</label>
                        <textarea rows="2" placeholder="请输入题目整体解析" class="w-full p-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-primary resize-none"></textarea>
                    </div>
                    <div class="mt-6">
                        <button class="w-full bg-primary text-white py-3 rounded-xl text-sm font-bold shadow-md active:bg-blue-600 transition" onclick="saveQuestion()">保存题目</button>
                    </div>
                </div>

                <!-- Batch Import Form -->
                <div id="add-batch-form" class="add-tab-content hidden">
                    <div class="bg-white rounded-xl p-4 mb-4 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-2">批量导入 (JSON格式)</label>
                        <textarea id="batch-input" rows="10" class="w-full p-3 border border-gray-200 rounded-lg text-xs font-mono focus:outline-none focus:border-primary resize-none" placeholder='[
    {
        "title": "题目内容",
        "type": "single",
        "options": [
            {"text": "选项A", "isCorrect": true, "analysis": "解析A"},
            {"text": "选项B", "isCorrect": false}
        ],
        "analysis": "题目解析",
        "knowledgeId": 123
    }
]'></textarea>
                    </div>
                    <div class="mt-6">
                        <button class="w-full bg-primary text-white py-3 rounded-xl text-sm font-bold shadow-md active:bg-blue-600 transition" onclick="processBatchImport()">解析并导入</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Updated Modal for Knowledge Tree with Search -->
        <div id="tree-modal" class="hidden fixed inset-0 bg-black/50 z-[70] items-end justify-center">
            <div class="w-full h-[80%] bg-white rounded-t-2xl flex flex-col animate-slide-up">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center shrink-0">
                    <h3 class="text-base font-bold text-gray-800">选择知识点</h3>
                    <span class="text-2xl text-gray-400 cursor-pointer hover:text-gray-600" onclick="closeModal('tree-modal')">&times;</span>
                </div>
                <div class="p-3 border-b border-gray-50 bg-gray-50/50">
                    <input type="text" id="tree-search-input" placeholder="搜索知识点..." class="w-full p-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-primary" oninput="searchTree(this.value)">
                </div>
                <div class="flex-1 overflow-y-auto p-4">
                    <div class="tree-level" id="tree-root">
                        <!-- Dynamic Tree Content -->
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('action') === 'addQ') {
            document.getElementById('tree-manage-section').classList.add('hidden');
            document.getElementById('add-question-section').classList.remove('hidden');
        }
    </script>
    <style>
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</body>
</html>
